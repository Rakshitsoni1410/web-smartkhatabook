<svg width="500" height="520" viewBox="0 0 500 520" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Main Blue Color -->
  <defs>
    <style>
      .line {
        stroke:#1E90FF;
        stroke-width:10;
        fill:none;
        stroke-linecap:round;
        stroke-linejoin:round;
      }
      .text1{
        fill:#1E90FF;
        font-size:34px;
        font-family:Arial, sans-serif;
        font-weight:bold;
        letter-spacing:4px;
      }
      .text2{
        fill:#1E90FF;
        font-size:18px;
        font-family:Arial, sans-serif;
        font-weight:bold;
      }
    </style>
  </defs>

  <!-- Receipt Top -->
  <path d="M160 80 H330 Q350 80 350 100 V280" class="line"></path>

  <!-- Receipt Curl -->
  <path d="M330 80 Q370 80 370 120 V150 H330" class="line"></path>

  <!-- Calculator Body -->
  <rect x="110" y="120" width="120" height="180" rx="10" class="line"></rect>

  <!-- Calculator Screen -->
  <rect x="135" y="145" width="70" height="45" rx="5" class="line"></rect>

  <!-- Calculator Buttons -->
  <circle cx="145" cy="220" r="4" fill="#1E90FF"></circle>
  <circle cx="165" cy="220" r="4" fill="#1E90FF"></circle>
  <circle cx="185" cy="220" r="4" fill="#1E90FF"></circle>

  <circle cx="145" cy="245" r="4" fill="#1E90FF"></circle>
  <circle cx="165" cy="245" r="4" fill="#1E90FF"></circle>
  <circle cx="185" cy="245" r="4" fill="#1E90FF"></circle>

  <circle cx="145" cy="270" r="4" fill="#1E90FF"></circle>
  <circle cx="165" cy="270" r="4" fill="#1E90FF"></circle>
  <circle cx="185" cy="270" r="4" fill="#1E90FF"></circle>

  <!-- Receipt Lines -->
  <line x1="250" y1="125" x2="315" y2="125" class="line"></line>
  <line x1="250" y1="150" x2="315" y2="150" class="line"></line>
  <line x1="250" y1="175" x2="315" y2="175" class="line"></line>
  <line x1="250" y1="200" x2="315" y2="200" class="line"></line>
  <line x1="250" y1="225" x2="315" y2="225" class="line"></line>

  <!-- Base -->
  <path d="M160 300 V340 H300" class="line"></path>
  <path d="M110 340 H320" class="line"></path>

  <!-- Coin -->
  <circle cx="320" cy="290" r="55" class="line"></circle>
  <text x="302" y="310" font-size="60" fill="#1E90FF" font-weight="bold">$</text>

  <!-- Brand Text -->
  <text x="70" y="430" class="text1">SMART KHATABOOK</text>
  <text x="140" y="470" class="text2">TRACK. MANAGE. PROFIT</text>

</svg>